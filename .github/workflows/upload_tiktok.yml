name: Auto Upload TikTok

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependensi
        run: |
          pip install -r requirements.txt

      - name: Setup Google Drive credentials
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: |
          echo "$GDRIVE_CREDENTIALS" > gdrive_credentials.json

      - name: Download video dari Google Drive
        run: |
          python download_from_drive.py

      - name: Upload ke TikTok
        env:
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Mulai upload..."
          python -u upload_script.py
          echo "Selesai upload. Exit code: $?"
